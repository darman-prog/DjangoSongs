<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Songs{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* ── Variables globales ──────────────────────────────────────── */
        :root {
            --obsidian:      #0a0a0f;
            --slate:         #13141c;
            --amber:         #f0a830;
            --amber-alfa:    rgba(240, 168, 48, 0.10);
            --amber-borde:   rgba(240, 168, 48, 0.24);
            --amber-glow:    rgba(240, 168, 48, 0.06);
            --ivory:         #e8e4dc;
            --dust:          #5a5466;
            --dust-light:    #7d7590;
            --borde:         rgba(255, 255, 255, 0.06);
            --fondo-nav:     rgba(10, 10, 15, 0.90);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--obsidian);
            color: var(--ivory);
            min-height: 100vh;
            padding-bottom: 5rem;
            -webkit-font-smoothing: antialiased;
        }

        /* Sutil gradiente radial ámbar — reemplaza la cuadrícula verde */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 900px 500px at 50% -100px, rgba(240, 168, 48, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 600px 600px at 80% 90%, rgba(240, 168, 48, 0.025) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Textura de ruido casi imperceptible */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none;
        }

        /* ── Navbar ──────────────────────────────────────────────────── */
        .dj-nav {
            background: var(--fondo-nav);
            border-bottom: 1px solid var(--borde);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: .9rem 0;
        }

        /* Línea decorativa ámbar bajo el nav */
        .dj-nav::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amber), transparent);
            opacity: .30;
        }

        .dj-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.65rem;
            letter-spacing: .08em;
            color: var(--ivory);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .6rem;
            transition: opacity .2s;
        }
        .dj-brand:hover { opacity: .7; color: var(--ivory); }

        .dj-brand-accent {
            color: var(--amber);
        }

        .dj-nav-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: .68rem;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--dust-light);
            text-decoration: none;
            padding: .42rem .9rem;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: color .15s, background .15s, border-color .15s;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .dj-nav-link:hover {
            color: var(--amber);
            background: var(--amber-alfa);
            border-color: var(--amber-borde);
        }
        .dj-nav-link.activo {
            color: var(--amber);
            background: var(--amber-alfa);
            border-color: var(--amber-borde);
        }

        /* ── Contenido principal ─────────────────────────────────────── */
        .main-content {
            position: relative;
            z-index: 1;
            padding: 2.5rem 0 3rem;
        }

        /* ── Footer ──────────────────────────────────────────────────── */
        .dj-footer {
            position: fixed;
            inset: auto 0 0;
            background: var(--fondo-nav);
            border-top: 1px solid var(--borde);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            padding: .55rem 1rem;
            z-index: 50;
        }

        .dj-footer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--dust);
        }

        .dj-footer-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--amber);
            opacity: .40;
        }

        /* ── Mensajes / alertas ──────────────────────────────────────── */
        .dj-alert {
            font-size: .82rem;
            font-weight: 500;
            letter-spacing: .02em;
            border-radius: 10px;
            border: 1px solid var(--amber-borde);
            background: var(--amber-alfa);
            color: var(--amber);
            padding: .7rem 1rem;
        }

        /* ── Scrollbar personalizada ─────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--obsidian); }
        ::-webkit-scrollbar-thumb {
            background: rgba(240, 168, 48, .18);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(240, 168, 48, .35);
        }

        /* ── Selección de texto ──────────────────────────────────────── */
        ::selection {
            background: rgba(240, 168, 48, .25);
            color: var(--ivory);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ── Navbar ─────────────────────────────────────────────────── -->
    <nav class="dj-nav">
        <div class="container d-flex align-items-center justify-content-between">

            <a href="{% url 'canciones:index' %}" class="dj-brand">
                <span class="dj-brand-accent">♫</span> Django Songs
            </a>

            <div class="d-flex align-items-center gap-2">
                <a href="{% url 'canciones:index' %}"
                    class="dj-nav-link {% block nav_catalogo %}{% endblock %}">
                    <i class="bi bi-grid-3x3-gap-fill" style="font-size:.7rem;"></i>
                    Catálogo
                </a>
                <a href="{% url 'canciones:spotify_search' %}"
                    class="dj-nav-link {% block nav_spotify %}{% endblock %}">
                    <i class="bi bi-spotify" style="font-size:.7rem;"></i>
                    Spotify
                </a>
            </div>

        </div>
    </nav>

    <!-- ── Mensajes flash (opcional) ──────────────────────────────── -->
    {% if messages %}
    <div class="container" style="position:relative;z-index:1;padding-top:1rem;">
        {% for message in messages %}
        <div class="dj-alert d-flex align-items-center gap-2 mb-2">
            <i class="bi bi-check-circle-fill"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- ── Contenido ──────────────────────────────────────────────── -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────────── -->
    <footer class="dj-footer">
        <span class="dj-footer-dot"></span>
        <span class="dj-footer-text">Django Songs</span>
        <span class="dj-footer-dot"></span>
        <span class="dj-footer-text">Catálogo Musical Personal</span>
        <span class="dj-footer-dot"></span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
