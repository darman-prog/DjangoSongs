<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Songs</title>

    <!-- Google Fonts: Bebas Neue (display) + Space Grotesk (cuerpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --verde:      #00e676;
            --verde-glow: rgba(0, 230, 118, 0.55);
            --fondo:      #080b0f;
            --texto-dim:  #5a6070;
        }

        /* ── Reset y cuerpo ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--fondo);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Cuadrícula decorativa de fondo ────────────────────────── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,230,118,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,.04) 1px, transparent 1px);
            background-size: 56px 56px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Orbs de luz ambiental ──────────────────────────────────── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: .13;
            pointer-events: none;
            z-index: 0;
            animation: flotar 9s ease-in-out infinite;
        }
        .orb-1 { width: 460px; height: 460px; background: var(--verde); top: -140px; left: -120px; }
        .orb-2 { width: 320px; height: 320px; background: #00bcd4; bottom: -90px; right: -90px; animation-delay: -4.5s; }

        @keyframes flotar {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(24px, 16px); }
        }

        /* ── Hero ───────────────────────────────────────────────────── */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 700px;
        }

        /* Icono con pulso luminoso */
        .icono-principal {
            font-size: clamp(4.5rem, 12vw, 7rem);
            line-height: 1;
            display: block;
            margin-bottom: 1.2rem;
            animation: pulso 2.8s ease-in-out infinite;
        }
        @keyframes pulso {
            0%, 100% { filter: drop-shadow(0 0 16px var(--verde-glow)); transform: scale(1); }
            50%       { filter: drop-shadow(0 0 36px var(--verde-glow)); transform: scale(1.06); }
        }

        /* Título principal */
        .titulo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4.5rem, 14vw, 9.5rem);
            letter-spacing: .06em;
            line-height: .9;
            color: var(--verde);
            text-shadow:
                0 0 30px var(--verde-glow),
                0 0 70px rgba(0,230,118,.18);
            margin-bottom: .3rem;
        }

        /* Subtítulo */
        .subtitulo {
            font-size: clamp(.9rem, 3vw, 1.15rem);
            font-weight: 300;
            letter-spacing: .35em;
            text-transform: uppercase;
            color: var(--texto-dim);
            margin-bottom: 2.8rem;
        }

        /* Badges de tecnologías */
        .badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: .5rem;
        }
        .badge-tech {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            background: rgba(0,230,118,.07);
            border: 1px solid rgba(0,230,118,.18);
            color: var(--verde);
            padding: .4rem 1.1rem;
            border-radius: 100px;
            font-size: .72rem;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            transition: background .2s, border-color .2s;
        }
        .badge-tech:hover {
            background: rgba(0,230,118,.14);
            border-color: rgba(0,230,118,.4);
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--verde);
            animation: parpadeo 1.6s ease-in-out infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50%       { opacity: .2; }
        }

    </style>
</head>
<body>

    <!-- Fondo decorativo -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Portada principal -->
    <main class="hero">
        <span class="icono-principal">🎧</span>

        <h1 class="titulo">Django Songs</h1>
        <p class="subtitulo">Tu catálogo musical personal</p>

        <div class="badges">
            <span class="badge-tech"><span class="dot"></span>Django 5.x</span>
            <span class="badge-tech"><span class="dot"></span>MySQL</span>
            <span class="badge-tech"><span class="dot"></span>Bootstrap 5</span>
            <span class="badge-tech"><span class="dot"></span>Python</span>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
